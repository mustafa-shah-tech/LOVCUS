<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Handmade Jewelry | LOVCUS Pakistan</title>
  <meta name="description"
    content="View product details, customization options, and pricing for this handmade LOVCUS jewelry item. Order directly via WhatsApp." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://lovcus.store/product.html">

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="header-placeholder"></div>

  <section class="section">
    <div id="product-detail-container">
      <!-- JS injects content here -->
    </div>
  </section>

  <!-- Reviews Section -->
  <section class="section reviews-section" id="reviews-container">
    <h2 class="section-title">Customer Feedback</h2>

    <div id="reviews-list" class="reviews-grid">
      <!-- Existing reviews will be injected here -->
    </div>

    <div class="review-form-container">
      <h3>Share Your Thoughts</h3>
      <form id="feedback-form" onsubmit="handleReviewSubmit(event)">
        <div class="form-group">
          <label for="review-name">Name</label>
          <input type="text" id="review-name" required placeholder="Your Name">
        </div>
        <div class="form-group">
          <label>Rating</label>
          <div class="star-rating">
            <input type="radio" name="rating" value="5" id="star5"><label for="star5">★</label>
            <input type="radio" name="rating" value="4" id="star4"><label for="star4">★</label>
            <input type="radio" name="rating" value="3" id="star3"><label for="star3">★</label>
            <input type="radio" name="rating" value="2" id="star2"><label for="star2">★</label>
            <input type="radio" name="rating" value="1" id="star1"><label for="star1">★</label>
          </div>
        </div>
        <div class="form-group">
          <label for="review-text">Your Review</label>
          <textarea id="review-text" rows="4" required placeholder="What did you like about this product?"></textarea>
        </div>
        <button type="submit" class="btn">Post Review</button>
      </form>
    </div>
  </section>

  <p class="seo-links">
    <a href="index.html">Home</a> |
    <a href="shop.html">Shop Bracelets</a>
  </p>

  <div id="footer-placeholder"></div>
  <script src="script.js" defer></script>
</body>

</html>
